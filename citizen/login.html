<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Login - Road Damage Detection</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background: #ffffff;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .login-icon-top {
            width: 50px;
            height: 50px;
            background: #eff6ff;
            color: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-subtitle {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .login-header h1 {
            color: #0f172a;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .form-label {
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            width: 100%;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .forgot-link {
            float: right;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            padding: 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .bottom-links {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .bottom-links p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .bottom-links a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #0f172a;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-icon-top">🏙️</div>
        <div class="login-header">
            <span class="login-subtitle">Solapur Municipal Corporation</span>
            <h1>Citizen Login</h1>
            <p>Sign in to report and track road infrastructure issues</p>
        </div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label class="form-label">Email or Mobile</label>
                <input type="text" class="form-input" required placeholder="name@example.com or 10-digit mobile">
            </div>
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <a href="#" class="forgot-link">Forgot password?</a>
                <label class="form-label">Password</label>
                <div class="password-container">
                    <input type="password" class="form-input password-input" id="passwordInput" required
                        placeholder="Enter your password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('passwordInput')">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="bottom-links">
            <p>New Citizen? <a href="register.html">Create Account</a></p>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script src="../shared/modal.js"></script>
    <script src="../shared/auth.js"></script>
    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.querySelector('input[type="text"]').value;
            const password = document.getElementById('passwordInput').value;

            try {
                await Auth.login(email, password, 'citizen');
                window.location.href = 'dashboard.html';
            } catch (error) {
                // Use modal if available, fallback to alert
                if (window.showModal) showModal('Login Failed', error.message);
                else alert(error.message);
            }
        }
    </script>
</body>

</html>
