<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Road Damage Detection</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="styles/notifications.css">
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <h1>Notifications</h1>
        <div class="profile-container">
            <div class="profile-icon" onclick="toggleProfileMenu()">👤</div>
            <div class="profile-menu" id="profileMenu">
                <div class="menu-header">
                    <span class="user-name">Loading...</span>
                    <span class="user-role">Role</span>
                </div>
                <button class="menu-item logout" onclick="confirmLogout()">
                    <span>🚪</span> Logout
                </button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="report-damage.html" class="nav-link">Report Damage</a>
        <a href="tracking.html" class="nav-link">Track Reports</a>
        <a href="notifications.html" class="nav-link active">Notifications</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="notifications-header">
            <h2>Updates & Alerts</h2>
            <button class="btn btn-secondary" onclick="markAllAsRead()">Mark All as Read</button>
        </div>

        <div class="notifications-list" id="notificationsList">
            <!-- Notifications will be populated by JavaScript -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🔔</div>
            <p>No notifications yet</p>
        </div>
    </div>

    <script src="../shared/navigation.js"></script>
    <script src="../shared/modal.js"></script>
    <script src="scripts/notifications.js"></script>
</body>

</html>
